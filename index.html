<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>หาตะกร้า | Box → Basket Finder</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0B1520">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.umd.min.js"></script>

  <style>
    /* ==========================================================================
       🎨 DESIGN TOKENS
       ========================================================================== */
    :root {
      --bg-app: #f8fafc;
      --surface: #ffffff;
      --surface-raised: #ffffff;
      --border: #e2e8f0;
      --border-focus: #4f46e5;

      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-inverse: #ffffff;

      --primary: #0f172a;
      --primary-gradient: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      --accent: #4f46e5;
      --accent-soft: #eeecfd;

      --good: #10b981;
      --good-soft: #f0fdf4;
      --bad: #ef4444;
      --bad-soft: #fef2f2;

      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 20px -2px rgba(15, 23, 42, 0.06), 0 2px 8px -1px rgba(15, 23, 42, 0.04);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-app: #080e16;
        --surface: #111b27;
        --surface-raised: #172434;
        --border: #203044;
        --border-focus: #818cf8;

        --text-main: #f8fafc;
        --text-muted: #94a3b8;

        --primary: #ffffff;
        --primary-gradient: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
        --accent: #818cf8;
        --accent-soft: rgba(129, 140, 248, 0.15);

        --good: #34d399;
        --good-soft: rgba(52, 211, 153, 0.1);
        --bad: #f87171;
        --bad-soft: rgba(248, 113, 113, 0.1);
        --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
    }

    /* ==========================================================================
       🧱 BASE RESETS
       ========================================================================== */
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body { margin: 0; padding: 0; background: var(--bg-app); color: var(--text-main); font-family: 'Sarabun', system-ui, sans-serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    button { -webkit-user-select: none; user-select: none; }
    :focus-visible { outline: 2.5px solid var(--border-focus); outline-offset: 2px; }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg-app);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0,0,0,0.03);
      position: relative;
    }

    /* ==========================================================================
       👑 HEADER / TOPBAR
       ========================================================================== */
    header.topbar {
      background: rgba(248, 250, 252, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    @media (prefers-color-scheme: dark) {
      header.topbar { background: rgba(8, 14, 22, 0.8); }
    }

    header.topbar .row1 { display: flex; align-items: center; justify-content: space-between; }
    header.topbar h1 {
      font-size: 20px;
      margin: 0;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.5px;
    }
    .box-emoji { font-size: 24px; transform: translateY(-1px); }

    .status-pill {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: var(--shadow-sm);
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bad); flex-shrink: 0; }
    .status-dot.ok { background: var(--good); box-shadow: 0 0 8px var(--good); }

    /* ==========================================================================
       📦 MAIN CONTENT & LAYOUT CARDS
       ========================================================================== */
    main { flex: 1; padding: 24px 24px 40px; display: flex; flex-direction: column; }
    section { display: none; width: 100%; height: 100%; }
    section.active { display: flex; flex-direction: column; gap: 20px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-md);
    }

    .scan-hero { text-align: center; padding: 40px 24px 30px; }
    .icon-wrap {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      border-radius: var(--radius-lg);
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: inset 0 0 20px rgba(79, 70, 229, 0.05);
    }
    .scan-hero h2 { font-size: 22px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.5px; }
    .scan-hero p { font-size: 14px; color: var(--text-muted); margin: 0; line-height: 1.5; }

    /* ==========================================================================
       🔘 BUTTONS & CONTROLS
       ========================================================================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: inherit;
      font-weight: 600;
      font-size: 15px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      padding: 16px 24px;
      width: 100%;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--primary-gradient);
      color: var(--surface);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
    }
    @media (prefers-color-scheme: dark) {
      .btn-primary { color: #000; font-weight: 700; }
    }

    .btn-secondary {
      background: var(--surface-raised);
      color: var(--text-main);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .btn-secondary:hover { background: var(--bg-app); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    .divider-or {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
    }
    .divider-or::before, .divider-or::after { content: ""; flex: 1; height: 1px; background: var(--border); }

    /* MANUAL INPUT */
    .manual-field label { font-size: 13px; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 8px; letter-spacing: 0.5px; }
    .manual-input-row { display: flex; gap: 10px; }

    .code-input {
      flex: 1;
      border: 1.5px solid var(--border);
      background: var(--surface-raised);
      color: var(--text-main);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.2s;
      min-width: 0;
    }
    .code-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
    .code-input::placeholder { color: var(--text-muted); opacity: 0.6; }

    /* ==========================================================================
       📷 IMMERSIVE CAMERA SCANNER UI
       ========================================================================== */
    #scanCamera { display: none; width: 100%; margin-top: 10px; }
    .cam-wrap {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #000;
      aspect-ratio: 1/1;
      box-shadow: var(--shadow-lg);
    }
    .cam-wrap video { width: 100%; height: 100%; object-fit: cover; }

    .cam-frame {
      position: absolute;
      inset: 15%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.6);
      pointer-events: none;
    }
    .cam-frame::before, .cam-frame::after {
      content: ''; position: absolute; width: 24px; height: 24px; border-color: #fff; border-style: solid; border-width: 0;
    }
    .cam-frame::before { top: -2px; left: -2px; border-top-width: 4px; border-left-width: 4px; border-top-left-radius: 12px; }
    .cam-frame::after { bottom: -2px; right: -2px; border-bottom-width: 4px; border-right-width: 4px; border-bottom-right-radius: 12px; }

    .cam-hint {
      position: absolute;
      bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      color: white; padding: 8px 18px; border-radius: 100px;
      font-size: 13px; font-weight: 600; text-align: center; pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: opacity .2s ease;
    }

    .cam-close {
      position: absolute; top: 16px; right: 16px; border: none;
      background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
      color: white; width: 40px; height: 40px; border-radius: 50%;
      font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;
      touch-action: manipulation;
    }

    /* ✅ ตัวนับจำนวนที่สแกนสำเร็จระหว่างเซสชันกล้อง (ฟีดแบ็กว่าสแกนต่อเนื่องได้จริง) */
    .cam-counter {
      position: absolute; top: 16px; left: 16px;
      background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
      color: white; padding: 7px 14px; border-radius: 100px;
      font-size: 12.5px; font-weight: 700; display: none; align-items: center; gap: 6px;
    }
    .cam-counter.show { display: flex; }

    /* ==========================================================================
       📊 RESULTS & DATA PRESENTATION (full-page — ใช้ตอนค้นหาด้วยมือ/จากประวัติ)
       ========================================================================== */
    #scanResult { display: none; width: 100%; }
    .result-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow-lg); }

    .result-top { padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; }
    .result-top.found { background: var(--good-soft); border-bottom: 1px solid var(--border); }
    .result-top.notfound { background: var(--bad-soft); border-bottom: 1px solid var(--border); }

    .badge { padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
    .badge.found { background: var(--good); color: #fff; }
    .badge.notfound { background: var(--bad); color: #fff; }
    .badge.badge-type { background: var(--surface-raised); color: var(--text-main); border: 1px solid var(--border); }

    .basket-hero { text-align: center; padding: 36px 24px; background: linear-gradient(180deg, var(--surface) 0%, var(--bg-app) 100%); }
    .basket-hero .label { color: var(--text-muted); font-size: 13px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
    .basket-hero .num { font-size: 64px; font-weight: 800; color: var(--accent); font-family: 'JetBrains Mono', monospace; letter-spacing: -2px; line-height: 1; }
    .basket-hero p { font-size: 15px; color: var(--text-muted); margin: 12px 0 0; }

    .detail-list { padding: 12px 24px; background: var(--surface); }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .k { color: var(--text-muted); font-weight: 500; }
    .detail-row .v { font-weight: 700; color: var(--text-main); text-align: right; }

    .result-actions { padding: 24px; display: flex; gap: 12px; background: var(--surface); border-top: 1px solid var(--border); }

    /* ==========================================================================
       🔄 CONTINUOUS-SCAN BOTTOM SHEET (โผล่ทับกล้อง — สแกนกล่องต่อไปได้ทันที)
       ========================================================================== */
    .scan-sheet-backdrop {
      position: fixed; inset: 0;
      background: rgba(4, 8, 14, 0.55);
      opacity: 0; pointer-events: none;
      transition: opacity .28s ease;
      z-index: 500;
    }
    .scan-sheet-backdrop.show { opacity: 1; pointer-events: auto; }

    .scan-sheet {
      position: fixed;
      left: 50%;
      bottom: 0;
      width: 100%;
      max-width: 480px;
      max-height: 82vh;
      overflow-y: auto;
      background: var(--surface);
      border-radius: 28px 28px 0 0;
      box-shadow: var(--shadow-lg);
      transform: translateX(-50%) translateY(110%);
      transition: transform .34s cubic-bezier(0.19, 1, 0.22, 1);
      z-index: 501;
      padding-bottom: max(env(safe-area-inset-bottom), 16px);
    }
    .scan-sheet.show { transform: translateX(-50%) translateY(0); }

    .sheet-handle {
      width: 40px; height: 4px; border-radius: 4px;
      background: var(--border);
      margin: 12px auto 4px;
    }

    /* sheet ใช้ style เดียวกับ result-card แต่ไม่มีกรอบ/เงาซ้อน เพราะ sheet มีของตัวเองแล้ว */
    .scan-sheet .result-top { border-radius: 0; }
    .scan-sheet .result-actions { padding: 20px 24px 8px; border-top: none; }

    /* ==========================================================================
       🕒 SCAN HISTORY COMPONENT
       ========================================================================== */
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .history-header h3 { margin: 0; font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .btn-clear-history { background: none; border: none; color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.2s; }
    .btn-clear-history:hover { color: var(--bad); background: var(--bad-soft); }

    .history-list { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow-y: auto; padding-right: 4px; }
    .history-list::-webkit-scrollbar { width: 5px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .history-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-sm); transition: transform 0.15s; cursor: pointer; touch-action: manipulation; }
    .history-item:active { transform: scale(0.98); }
    .history-left { display: flex; align-items: center; gap: 12px; }

    .history-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; flex-shrink: 0; }
    .history-icon.success { background: var(--good-soft); color: var(--good); }
    .history-icon.fail { background: var(--bad-soft); color: var(--bad); }

    .history-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .history-box-no { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-time { font-size: 11px; color: var(--text-muted); }
    .history-right { text-align: right; flex-shrink: 0; padding-left: 10px; }
    .history-tray { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 800; color: var(--accent); }
    .history-status-text { font-size: 11px; font-weight: 600; color: var(--text-muted); }
    .history-empty { text-align: center; padding: 30px 0; color: var(--text-muted); font-size: 13px; }
    .history-empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }

    /* ==========================================================================
       🚨 TOASTS & OFFLINE NOTIFICATIONS
       ========================================================================== */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #0f172a; color: white; padding: 14px 28px; border-radius: 100px;
      font-size: 14px; font-weight: 600; box-shadow: var(--shadow-lg);
      opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
      max-width: 90%; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--bad); }

    .offline-banner {
      position: fixed; top: 0; left: 0; right: 0; background: var(--bad); color: white;
      text-align: center; font-size: 13px; font-weight: 700; padding: 10px 16px; z-index: 2000;
      transform: translateY(-100%); transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
      padding-top: max(10px, env(safe-area-inset-top));
    }
    .offline-banner.show { transform: translateY(0); }

    #app { padding-bottom: env(safe-area-inset-bottom); }
    header.topbar { padding-top: calc(20px + env(safe-area-inset-top)); }

    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
    }

    /* จอกว้างมาก (แท็บเล็ต/เดสก์ท็อป) — จัดกึ่งกลางสวยงาม ไม่ยืดเต็มจอ */
    @media (min-width: 520px) {
      body { background: var(--bg-app); }
      #app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }
  </style>
</head>

<body>

  <div id="offlineBanner" class="offline-banner">📡 ขาดการเชื่อมต่ออินเทอร์เน็ต — ผลค้นหาอาจไม่เป็นปัจจุบัน</div>

  <div id="app">
    <header class="topbar">
      <div class="row1">
        <h1><span class="box-emoji">📦</span> หาตะกร้า</h1>
        <div class="status-pill">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">DATABASE</span>
        </div>
      </div>
    </header>

    <main>
      <section id="tab-scan" class="active">

        <div id="scanIdle" style="display: flex; flex-direction: column; gap: 20px;">
          <div class="card scan-hero">
            <div class="icon-wrap">📷</div>
            <h2>สแกน QR BOX_NO</h2>
            <p>ยิง QR Code หรือพิมพ์รหัสกล่องด้านล่าง<br>เพื่อค้นหาตะกร้าแบบเรียลไทม์</p>
          </div>

          <div class="card">
            <button class="btn btn-primary" id="btnOpenCam">
              📷 เริ่มสแกนด้วยกล้อง
            </button>

            <div class="divider-or">หรือ</div>

            <div class="manual-field">
              <label for="manualInput">BOX_NO</label>
              <div class="manual-input-row">
                <input
                  id="manualInput"
                  class="code-input"
                  autocomplete="off"
                  autocapitalize="characters"
                  inputmode="text"
                  placeholder="เช่น BOX001">
                <button id="btnManualSearch" class="btn btn-secondary" style="width:auto">ค้นหา</button>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="history-header">
              <h3>🕒 ประวัติการสแกนล่าสุด</h3>
              <button class="btn-clear-history" id="btnClearHistory">ล้างทั้งหมด</button>
            </div>
            <div class="history-list" id="historyList"></div>
          </div>
        </div>

        <div id="scanCamera">
          <div class="cam-wrap">
            <video id="video" autoplay playsinline muted></video>
            <div class="cam-frame"></div>
            <div class="cam-counter" id="camCounter">✓ <span id="camCounterNum">0</span> กล่องแล้ว</div>
            <div class="cam-hint" id="camHint">จัดให้ QR Code อยู่ในกรอบ</div>
            <button id="btnCloseCam" class="cam-close" aria-label="ปิดกล้อง">✕</button>
            <button id="btnTorch" class="cam-close" style="right: 66px; display: none;" aria-label="เปิด/ปิดไฟฉาย">💡</button>
          </div>
          <canvas id="canvas" style="display: none;"></canvas>
        </div>

        <div id="scanResult" aria-live="polite"></div>

      </section>
    </main>
  </div>

  <!-- ✅ Continuous-scan sheet: โผล่ทับกล้องหลังสแกนสำเร็จ กดสแกนต่อได้ทันทีโดยไม่ต้องออกจากกล้อง -->
  <div id="scanSheetBackdrop" class="scan-sheet-backdrop"></div>
  <div id="scanSheet" class="scan-sheet" role="dialog" aria-modal="true" aria-live="polite" tabindex="-1">
    <div class="sheet-handle"></div>
    <div id="scanSheetContent"></div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      "use strict";

      // ⚠️ แก้ URL นี้ให้เป็น URL ของ Apps Script Web App ที่ Deploy ไว้จริง
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw3UvwvBumX3Gx4Sp3FaD5fJnB2_b_0cBGdlGr8UxnxfHuRdX5pp2bH-CrxeTJ7VBV4/exec";

      let qrScanner = null;
      let cameraActive = false;   // true ระหว่างที่กล้องเปิดอยู่ (ควบคุมว่าผลลัพธ์ควรขึ้นเป็น sheet หรือเต็มหน้า)
      let scanLocked = false;     // true ระหว่างที่ sheet เปิดอยู่ กันไม่ให้ยิง QR ซ้ำจนกว่าจะกด "สแกนต่อ"

      QrScanner.WORKER_PATH = "https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner-worker.min.js";

      // =====================
      // Security: escape ข้อมูลก่อนแทรกลง innerHTML เสมอ (กัน XSS จากข้อมูลใน Sheet)
      // =====================
      const HTML_ESCAPE_MAP = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" };
      function esc(value) {
        const str = (value === null || value === undefined || value === "") ? "-" : String(value);
        return str.replace(/[&<>"']/g, ch => HTML_ESCAPE_MAP[ch]);
      }

      // =====================
      // Haptic feedback (Android รองรับ, iOS Safari เงียบไว้ไม่ error)
      // =====================
      function vibrate(pattern) {
        try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) { }
      }

      // =====================
      // Offline detection
      // =====================
      const offlineBanner = document.getElementById("offlineBanner");
      function updateOnlineStatus() { offlineBanner.classList.toggle("show", !navigator.onLine); }
      window.addEventListener("online", updateOnlineStatus);
      window.addEventListener("offline", updateOnlineStatus);
      updateOnlineStatus();

      // =====================
      // Toast
      // =====================
      function toast(msg, type) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = "toast show " + (type || "");
        clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => { t.className = "toast"; }, 2500);
      }

      // =====================
      // Local database.json: โหลดครั้งเดียว ค้นหาแบบ instant ถ้าโหลดไม่สำเร็จ -> fallback Apps Script
      // =====================
      let DB_DATA = null;

      async function loadDatabase(force) {
        try {
          const url = "database.json" + (force ? ("?t=" + Date.now()) : "");
          const res = await fetch(url, { cache: force ? "no-store" : "default" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          DB_DATA = await res.json();
          setStatus(true, "DATABASE");
        } catch (e) {
          console.log("โหลด database.json ไม่สำเร็จ จะใช้ Apps Script แทนตอนค้นหา:", e);
          DB_DATA = null;
          setStatus(false, "DATABASE (fallback)");
        }
      }

      function setStatus(ok, label) {
        document.getElementById("statusDot").classList.toggle("ok", ok);
        document.getElementById("statusText").textContent = label;
      }

      loadDatabase(false);
      setInterval(() => loadDatabase(true), 5 * 60 * 1000);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") loadDatabase(true);
      });

      // =====================
      // Search
      // =====================
      let searchToken = 0; // กัน race condition เวลากดค้นหาซ้ำเร็วๆ

      function setSearchBusy(busy) {
        const btn = document.getElementById("btnManualSearch");
        if (btn) {
          btn.disabled = busy;
          btn.textContent = busy ? "กำลังค้นหา…" : "ค้นหา";
        }
      }

      async function searchBox(boxNo) {
        const trimmed = (boxNo || "").trim();
        if (!trimmed) {
          toast("กรุณาใส่ BOX_NO", "error");
          scanLocked = false;
          return;
        }
        vibrate(15);
        const myToken = ++searchToken;
        setSearchBusy(true);
        try {
          if (DB_DATA) {
            searchBoxLocal(trimmed, myToken);
          } else {
            await searchBoxViaAppsScript(trimmed, myToken);
          }
        } finally {
          if (myToken === searchToken) setSearchBusy(false);
        }
      }

      function normalizeCode(v) { return String(v).trim().toUpperCase().replace(/\s+/g, ""); }

      function searchBoxLocal(boxNo, myToken) {
        const search = normalizeCode(boxNo);
        const row = DB_DATA.find(r => normalizeCode(r.boxNo) === search);
        if (myToken !== searchToken) return; // มีการค้นหาใหม่แซงไปแล้ว ทิ้งผลลัพธ์นี้

        if (row) {
          presentResult({
            found: true, type: row.type, boxNo: row.boxNo, itemCode: row.itemCode,
            itemName: row.itemName, qty: row.qty, tray: row.tray, note: row.note
          }, boxNo);
        } else {
          presentResult({ found: false }, boxNo);
        }
      }

      function searchBoxViaAppsScript(boxNo, myToken) {
        return new Promise((resolve) => {
          if (SCRIPT_URL.indexOf("PUT_YOUR_DEPLOYMENT_ID_HERE") !== -1) {
            toast("ยังไม่ได้ตั้งค่า SCRIPT_URL ในโค้ด", "error");
            resolve();
            return;
          }
          const callbackName = "jsonpCallback_" + Date.now() + "_" + myToken;
          const script = document.createElement("script");
          let done = false;

          const timeout = setTimeout(() => {
            if (!done) {
              done = true;
              if (myToken === searchToken) toast("เชื่อมต่อ DATABASE ไม่ได้ (timeout)", "error");
              cleanup(); resolve();
            }
          }, 10000);

          function cleanup() {
            delete window[callbackName];
            if (script.parentNode) script.parentNode.removeChild(script);
          }

          window[callbackName] = function (data) {
            if (done) return;
            done = true;
            clearTimeout(timeout);
            if (myToken === searchToken) presentResult(data, boxNo);
            cleanup(); resolve();
          };

          script.onerror = function () {
            if (done) return;
            done = true;
            clearTimeout(timeout);
            if (myToken === searchToken) toast("เชื่อมต่อ DATABASE ไม่ได้", "error");
            cleanup(); resolve();
          };

          script.src = SCRIPT_URL + "?boxNo=" + encodeURIComponent(boxNo) + "&callback=" + callbackName;
          document.body.appendChild(script);
        });
      }

      // =====================
      // ✅ Dispatcher: ตัดสินใจว่าจะโชว์ผลลัพธ์แบบเต็มหน้า (ค้นหาด้วยมือ/จากประวัติ)
      // หรือแบบ sheet ลอยทับกล้อง (ระหว่างสแกนต่อเนื่อง)
      // =====================
      function presentResult(data, code) {
        if (data.found) {
          saveToHistory(data.boxNo, data.tray, true);
        } else {
          saveToHistory(code, null, false);
        }

        if (cameraActive) {
          openScanSheet(data, code);
        } else {
          showResult(data, code);
        }
      }

      // =====================
      // Full-page result (ค้นหาด้วยมือ / กดจากประวัติ)
      // =====================
      function showResult(data, code) {
        const result = document.getElementById("scanResult");
        document.getElementById("scanIdle").style.display = "none";
        stopCamera();
        result.style.display = "block";

        vibrate(data.found ? 60 : [40, 80, 40]);

        result.innerHTML = data.found ? resultFoundHtml(data, {
          exitId: "again", exitLabel: "ย้อนกลับ",
          continueId: "scanAgain", continueLabel: "📷 สแกนต่อ"
        }) : resultNotFoundHtml(code, {
          exitId: "again", exitLabel: "ย้อนกลับ", fullWidth: true
        });

        document.getElementById("again")?.addEventListener("click", () => {
          result.style.display = "none";
          document.getElementById("scanIdle").style.display = "flex";
          document.getElementById("manualInput").value = "";
          renderHistory();
        });

        document.getElementById("scanAgain")?.addEventListener("click", openCamera);
      }

      // =====================
      // ✅ Continuous-scan sheet (ระหว่างเปิดกล้อง)
      // สแกนสำเร็จ -> sheet เด้งขึ้นทับกล้อง -> กด "สแกนต่อ" -> sheet ปิดลง กลับไปสแกนกล่องถัดไปได้ทันที
      // กด "ย้อนกลับ" -> ปิดกล้อง กลับหน้าแรก
      // =====================
      let scannedCount = 0;

      function openScanSheet(data, code) {
        vibrate(data.found ? 60 : [40, 80, 40]);

        if (data.found) scannedCount++;
        updateCamCounter();

        const content = document.getElementById("scanSheetContent");
        content.innerHTML = data.found ? resultFoundHtml(data, {
          exitId: "sheetExit", exitLabel: "ย้อนกลับ",
          continueId: "sheetContinue", continueLabel: "📷 สแกนกล่องต่อไป"
        }) : resultNotFoundHtml(code, {
          exitId: "sheetExit", exitLabel: "ย้อนกลับ",
          continueId: "sheetContinue", continueLabel: "ลองสแกนใหม่"
        });

        document.getElementById("scanSheet").classList.add("show");
        document.getElementById("scanSheetBackdrop").classList.add("show");
        document.getElementById("camHint").style.opacity = "0";
        document.getElementById("scanSheet").focus({ preventScroll: true });

        document.getElementById("sheetExit")?.addEventListener("click", exitCameraToIdle);
        document.getElementById("sheetContinue")?.addEventListener("click", resumeScanning);
      }

      function closeScanSheet() {
        document.getElementById("scanSheet").classList.remove("show");
        document.getElementById("scanSheetBackdrop").classList.remove("show");
        document.getElementById("camHint").style.opacity = "1";
      }

      // กดสแกนกล่องต่อไป: ปิด sheet แล้วปลดล็อกให้กล้องอ่าน QR ถัดไปได้ทันที
      function resumeScanning() {
        closeScanSheet();
        setTimeout(() => { scanLocked = false; }, 340); // รอ animation sheet ปิดก่อนค่อยรับสแกนใหม่ กันอ่านรหัสเดิมซ้ำ
      }

      // กดย้อนกลับ: ปิด sheet + ปิดกล้อง + กลับหน้าแรก
      function exitCameraToIdle() {
        closeScanSheet();
        stopCamera();
        document.getElementById("scanCamera").style.display = "none";
        document.getElementById("scanIdle").style.display = "flex";
        renderHistory();
      }

      // แตะพื้นหลังมืด = เหมือนกด "สแกนต่อ" (รบกวนงานให้น้อยที่สุด)
      document.getElementById("scanSheetBackdrop").addEventListener("click", () => {
        if (document.getElementById("sheetContinue")) resumeScanning();
        else exitCameraToIdle();
      });

      function updateCamCounter() {
        const el = document.getElementById("camCounter");
        document.getElementById("camCounterNum").textContent = scannedCount;
        el.classList.toggle("show", scannedCount > 0);
      }

      // =====================
      // Shared result markup builders (ใช้ร่วมกันทั้งหน้าเต็มและ sheet)
      // =====================
      function resultFoundHtml(data, opts) {
        return `
          <div class="result-card" style="border:none;box-shadow:none;border-radius:0;">
            <div class="result-top found">
              <span class="badge found">พบข้อมูล ✓</span>
              <span class="badge badge-type">${esc(data.type)}</span>
            </div>
            <div class="basket-hero">
              <div class="label">TRAY</div>
              <div class="num">#${esc(data.tray)}</div>
            </div>
            <div class="detail-list">
              ${rowHtml("BOX_NO", data.boxNo)}
              ${rowHtml("ITEM_CODE", data.itemCode)}
              ${rowHtml("ITEM_NAME", data.itemName)}
              ${rowHtml("QTY", data.qty)}
              ${rowHtml("NOTE", data.note)}
            </div>
            <div class="result-actions">
              <button class="btn btn-secondary" id="${opts.exitId}">${opts.exitLabel}</button>
              <button class="btn btn-primary" id="${opts.continueId}">${opts.continueLabel}</button>
            </div>
          </div>`;
      }

      function resultNotFoundHtml(code, opts) {
        const secondBtn = opts.continueId
          ? `<button class="btn btn-primary" id="${opts.continueId}">${opts.continueLabel}</button>`
          : "";
        return `
          <div class="result-card" style="border:none;box-shadow:none;border-radius:0;">
            <div class="result-top notfound">
              <span class="badge notfound">ไม่พบข้อมูล</span>
            </div>
            <div class="basket-hero">
              <div class="label">BOX_NO</div>
              <div class="num" style="font-size:36px;color:var(--bad);">${esc(code)}</div>
              <p>ไม่มีรหัสนี้ในระบบ DATABASE</p>
            </div>
            <div class="result-actions">
              <button class="btn btn-secondary" id="${opts.exitId}" ${opts.fullWidth ? 'style="width:100%"' : ''}>${opts.exitLabel}</button>
              ${secondBtn}
            </div>
          </div>`;
      }

      function rowHtml(k, v) {
        return `<div class="detail-row"><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`;
      }

      // =====================
      // History (localStorage)
      // =====================
      function saveToHistory(boxNo, tray, isFound) {
        let history = JSON.parse(localStorage.getItem('scan_history') || '[]');
        const now = new Date();
        const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.';

        history = history.filter(item => normalizeCode(item.boxNo) !== normalizeCode(boxNo));
        history.unshift({ boxNo, tray: isFound ? `#${tray}` : 'ไม่พบข้อมูล', time: timeStr, success: isFound });
        if (history.length > 20) history.pop();
        localStorage.setItem('scan_history', JSON.stringify(history));
      }

      function renderHistory() {
        const listEl = document.getElementById('historyList');
        let history = JSON.parse(localStorage.getItem('scan_history') || '[]');

        if (history.length === 0) {
          listEl.innerHTML = `<div class="history-empty"><div class="history-empty-icon">📂</div>ไม่มีประวัติการสแกนล่าสุด</div>`;
          return;
        }

        listEl.innerHTML = history.map(item => `
          <div class="history-item" data-code="${esc(item.boxNo)}" role="button" tabindex="0">
            <div class="history-left">
              <div class="history-icon ${item.success ? 'success' : 'fail'}">${item.success ? '✓' : '✕'}</div>
              <div class="history-info">
                <span class="history-box-no">${esc(item.boxNo)}</span>
                <span class="history-time">${item.time}</span>
              </div>
            </div>
            <div class="history-right">
              <span class="history-tray" style="${!item.success ? 'color: var(--bad); font-size: 13px;' : ''}">${esc(item.tray)}</span>
              ${item.success ? '<div class="history-status-text">TRAY</div>' : ''}
            </div>
          </div>
        `).join('');

        listEl.querySelectorAll('.history-item').forEach(el => {
          const trigger = () => {
            const code = el.getAttribute('data-code');
            document.getElementById('manualInput').value = code;
            searchBox(code);
          };
          el.addEventListener('click', trigger);
          el.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); trigger(); } });
        });
      }

      document.getElementById('btnClearHistory').addEventListener('click', () => {
        localStorage.removeItem('scan_history');
        renderHistory();
        toast("ล้างประวัติเรียบร้อยแล้ว");
      });

      // =====================
      // Manual Input
      // =====================
      document.getElementById("btnManualSearch").addEventListener("click", () => {
        searchBox(document.getElementById("manualInput").value);
      });
      document.getElementById("manualInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") searchBox(e.target.value);
      });

      // =====================
      // Camera (qr-scanner)
      // =====================
      async function openCamera() {
        document.getElementById("scanIdle").style.display = "none";
        document.getElementById("scanResult").style.display = "none";
        document.getElementById("scanCamera").style.display = "block";

        cameraActive = true;
        scanLocked = false;
        scannedCount = 0;
        updateCamCounter();

        try {
          const video = document.getElementById("video");
          qrScanner = new QrScanner(
            video,
            result => {
              if (scanLocked) return; // sheet เปิดอยู่ / กำลังประมวลผลรอบก่อนหน้า ไม่รับสแกนซ้ำ
              scanLocked = true;
              searchBox(result.data);
            },
            {
              onDecodeError: () => { },
              preferredCamera: "environment",
              highlightScanRegion: true,
              highlightCodeOutline: true,
              maxScansPerSecond: 25
            }
          );

          await qrScanner.start();

          try {
            const hasFlash = await qrScanner.hasFlash();
            document.getElementById("btnTorch").style.display = hasFlash ? "flex" : "none";
          } catch (e) {
            document.getElementById("btnTorch").style.display = "none";
          }
        } catch (e) {
          console.log(e);
          toast("เปิดกล้องไม่ได้: " + e.message, "error");
          cameraActive = false;
          document.getElementById("scanCamera").style.display = "none";
          document.getElementById("scanIdle").style.display = "flex";
        }
      }

      function stopCamera() {
        cameraActive = false;
        scanLocked = false;
        if (qrScanner) { qrScanner.stop(); qrScanner.destroy(); qrScanner = null; }
        document.getElementById("btnTorch").style.display = "none";
      }

      function toggleTorch() {
        if (qrScanner) qrScanner.toggleFlash().catch(err => console.log("Torch error:", err));
      }

      document.getElementById("btnOpenCam").addEventListener("click", openCamera);
      document.getElementById("btnCloseCam").addEventListener("click", () => {
        closeScanSheet();
        stopCamera();
        document.getElementById("scanCamera").style.display = "none";
        document.getElementById("scanIdle").style.display = "flex";
        renderHistory();
      });
      document.getElementById("btnTorch").addEventListener("click", toggleTorch);

      // หยุดกล้องอัตโนมัติเมื่อผู้ใช้สลับแท็บ/พับแอป (ประหยัดแบต + ความเป็นส่วนตัว)
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden" && qrScanner) {
          closeScanSheet();
          stopCamera();
          document.getElementById("scanCamera").style.display = "none";
          document.getElementById("scanIdle").style.display = "flex";
        }
      });

      // Initial render
      renderHistory();

    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (err) {
          console.log('SW register failed:', err);
        });
      });
    }
  </script>

</body>
</html>
