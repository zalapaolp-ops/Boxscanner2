<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">


<title>หาตะกร้า | Box → Basket Finder</title>

<!-- ✅ PWA: manifest + icons + theme color (ไฟล์จริง อยู่โฟลเดอร์เดียวกัน) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#173047">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">


<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">


<script src="https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.umd.min.js"></script>


<style>


:root{

--ink:#12202b;
--navy:#173047;
--navy-2:#0e2033;
--paper:#f4f6f8;
--card:#ffffff;
--line:#dfe5ea;
--muted:#5b6b76;
--sea:#1f6fb2;
--sea-soft:#e7f1fb;
--good:#1c8a54;
--good-soft:#e5f6ec;
--bad:#c23b3b;
--bad-soft:#fbeaea;
--radius:16px;

}



*{
box-sizing:border-box;
}


html,body{

margin:0;
padding:0;

}



body{

font-family:'Sarabun',system-ui,sans-serif;

background:var(--paper);

color:var(--ink);

min-height:100vh;

-webkit-tap-highlight-color:transparent;

}



.mono{

font-family:'JetBrains Mono',monospace;

}



#app{

max-width:520px;

margin:auto;

min-height:100vh;

background:var(--paper);

display:flex;

flex-direction:column;

}



/* TOP BAR */


header.topbar{

background:linear-gradient(
155deg,
var(--navy),
var(--navy-2)
);

color:#fff;

padding:18px;

position:sticky;

top:0;

z-index:20;

}



header.topbar .row1{

display:flex;

align-items:center;

justify-content:space-between;

}



header.topbar h1{

font-size:17px;

margin:0;

font-weight:700;

display:flex;

align-items:center;

gap:8px;

}



.box-emoji{

font-size:20px;

}



.status-pill{

font-size:11.5px;

color:#cfe0ee;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

padding:5px 10px;

border-radius:100px;

display:flex;

align-items:center;

gap:6px;

}



.status-dot{

width:7px;

height:7px;

border-radius:50%;

background:#e05a5a;

}



.status-dot.ok{

background:#2fbf71;

}



nav.tabs{

display:flex;

gap:6px;

margin-top:14px;

background:rgba(255,255,255,.08);

padding:4px;

border-radius:12px;

}



nav.tabs button{

flex:1;

border:none;

background:transparent;

color:#cfe0ee;

font-family:inherit;

font-size:13.5px;

font-weight:600;

padding:9px;

border-radius:9px;

}



nav.tabs button.active{

background:#fff;

color:var(--navy);

}



/* MAIN */


main{

flex:1;

padding:16px 16px 40px;

}



section{

display:none;

}



section.active{

display:block;

}



.card{

background:#fff;

border:1px solid var(--line);

border-radius:var(--radius);

padding:18px;

}



.card+.card{

margin-top:14px;

}



.scan-hero{

text-align:center;

padding:26px 18px;

}



.icon-wrap{

width:84px;

height:84px;

margin:auto;

border-radius:22px;

background:var(--sea-soft);

display:flex;

align-items:center;

justify-content:center;

font-size:38px;

}



.scan-hero h2{

font-size:16px;

}



.scan-hero p{

font-size:12.5px;

color:var(--muted);

}



.btn{

display:inline-flex;

align-items:center;

justify-content:center;

gap:8px;

font-family:inherit;

font-weight:700;

font-size:14.5px;

border-radius:12px;

border:none;

cursor:pointer;

padding:13px 18px;

width:100%;

}



.btn-primary{

background:var(--navy);

color:white;

}



.btn-secondary{

background:white;

color:var(--navy);

border:1.5px solid var(--line);

}

.divider-or{
display:flex;
align-items:center;
gap:10px;
margin:16px 0;
color:var(--muted);
font-size:11.5px;
}

.divider-or::before,
.divider-or::after{
content:"";
flex:1;
height:1px;
background:var(--line);
}


.manual-field label{
font-size:12px;
font-weight:600;
color:var(--muted);
display:block;
margin-bottom:6px;
}


.manual-input-row{
display:flex;
gap:8px;
}


.code-input{
flex:1;
border:1.5px solid var(--line);
border-radius:11px;
padding:12px;
font-family:'JetBrains Mono',monospace;
font-size:15px;
font-weight:700;
}


.code-input:focus{
outline:none;
border-color:var(--sea);
}


.manual-hint{
font-size:11px;
color:var(--muted);
margin-top:7px;
}


.cam-wrap{
position:relative;
border-radius:16px;
overflow:hidden;
background:#000;
aspect-ratio:1/1;
}


.cam-wrap video{

width:100%;
height:100%;
object-fit:cover;

}


.cam-frame{

position:absolute;
inset:10%;
border:3px solid white;
border-radius:18px;

}


.cam-hint{

position:absolute;
bottom:10px;
left:0;
right:0;
margin:auto;

width:max-content;

background:rgba(0,0,0,.4);

color:white;

padding:6px 12px;

border-radius:50px;

font-size:12px;

}


.cam-close{

position:absolute;

top:10px;

right:10px;

border:none;

background:rgba(0,0,0,.5);

color:white;

width:35px;

height:35px;

border-radius:50%;

}



.result-card{

background:white;

border-radius:16px;

border:1px solid var(--line);

overflow:hidden;

}



.result-top{

padding:16px;

display:flex;

justify-content:space-between;

}



.result-top.found{

background:var(--good-soft);

}



.result-top.notfound{

background:var(--bad-soft);

}



.badge{

padding:5px 10px;

border-radius:50px;

font-size:12px;

font-weight:700;

}



.badge.found{

background:#c8ecd8;

color:var(--good);

}



.badge.notfound{

background:#f6cfcf;

color:var(--bad);

}



.basket-hero{

text-align:center;

padding:20px;

}



.basket-hero .label{

color:var(--muted);

font-size:12px;

}



.basket-hero .num{

font-size:52px;

font-weight:700;

color:var(--navy);

}



.detail-list{

padding:10px 18px;

}



.detail-row{

display:flex;

justify-content:space-between;

padding:10px 0;

border-bottom:1px dashed var(--line);

font-size:13px;

}



.detail-row .k{

color:var(--muted);

}



.detail-row .v{

font-weight:600;

text-align:right;

}



.result-actions{

padding:15px;

display:flex;

gap:10px;

}



.toast{

position:fixed;

bottom:22px;

left:50%;

transform:translateX(-50%);

background:#12202b;

color:white;

padding:12px 18px;

border-radius:50px;

opacity:0;

pointer-events:none;

transition:.2s;

z-index:100;

}


.toast.show{

opacity:1;

}



.toast.error{

background:#c23b3b;

}



</style>

</head>


<body>


<div id="app">


<header class="topbar">


<div class="row1">


<h1>
<span class="box-emoji">📦</span>
หาตะกร้า
</h1>


<div class="status-pill">

<span class="status-dot" id="statusDot"></span>

<span id="statusText">
DATABASE
</span>

</div>


</div>



<nav class="tabs">

<button class="active">
สแกนหากล่อง
</button>


</nav>


</header>




<main>


<section id="tab-scan" class="active">



<div id="scanIdle">


<div class="card scan-hero">


<div class="icon-wrap">
📷
</div>


<h2>
สแกน QR BOX_NO
</h2>


<p>
ยิง QR หรือพิมพ์รหัสกล่องเพื่อค้นหาตะกร้า
</p>


</div>




<div class="card">


<button class="btn btn-primary" id="btnOpenCam">

📷 เริ่มสแกนด้วยกล้อง

</button>



<div class="divider-or">
หรือ
</div>




<div class="manual-field">


<label>
BOX_NO
</label>



<div class="manual-input-row">


<input

id="manualInput"

class="code-input"

placeholder="เช่น BOX001">


<button

id="btnManualSearch"

class="btn btn-secondary"

style="width:auto">

ค้นหา

</button>


</div>


</div>


</div>


</div>





<div id="scanCamera" style="display:none">


<div class="cam-wrap">


<video id="video" autoplay playsinline muted></video>


<div class="cam-frame"></div>


<div class="cam-hint">

เล็ง QR ให้อยู่ในกรอบ

</div>


<button id="btnCloseCam" class="cam-close">

✕

</button>


<button id="btnTorch" class="cam-close" style="right:55px;display:none">

💡

</button>


</div>


<canvas id="canvas" style="display:none"></canvas>


</div>




<div id="scanResult" style="display:none"></div>




</section>


</main>


</div>



<div id="toast" class="toast"></div>
<script>

(function(){

"use strict";

// ⚠️ แก้ URL นี้ให้เป็น URL ของ Apps Script Web App ที่คุณ Deploy ไว้
// (หน้าตาแบบ: https://script.google.com/macros/s/xxxxxxx/exec)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhCWEirAVBD3x6ki-bhMFpV_DqEgPrrx7HXYRdLX4lYfSMaqdLLkgmAFnP6LXCQqSMSw/exec";

let qrScanner = null;

// ✅ qr-scanner (nimiq/qr-scanner) — ไลบรารีสแกน QR ที่ใช้กันแพร่หลายทั่วโลก
// ในโปรดักชันจริงหลายพันโปรเจกต์ ทำงานผ่าน Web Worker แยกจาก main thread
// (UI ไม่กระตุกระหว่างสแกน) มีระบบเลือกความละเอียด/scan-region และการ
// ตรวจจับ flash/torch ในตัวอยู่แล้ว ไม่ต้องเขียน loop สแกนเองอีกต่อไป
// ต้องตั้ง WORKER_PATH ให้ตรงกับเวอร์ชันที่โหลดมา (ดู <script> ใน <head>)
QrScanner.WORKER_PATH = "https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner-worker.min.js";



// =====================
// Toast
// =====================

function toast(msg,type){

const t=document.getElementById("toast");

t.textContent=msg;

t.className="toast show "+(type||"");


clearTimeout(window.toastTimer);

window.toastTimer=setTimeout(()=>{

t.className="toast";

},2500);

}




// =====================
// Search DATABASE (เรียกผ่าน JSONP ไปยัง Apps Script API)
// =====================

function searchBox(boxNo){

if(!boxNo){
toast("กรุณาใส่ BOX_NO","error");
return;
}

if(SCRIPT_URL.indexOf("PUT_YOUR_DEPLOYMENT_ID_HERE") !== -1){
toast("ยังไม่ได้ตั้งค่า SCRIPT_URL ในโค้ด","error");
return;
}

const callbackName = "jsonpCallback_" + Date.now();
const script = document.createElement("script");

let done = false;

const timeout = setTimeout(()=>{
if(!done){
done = true;
toast("เชื่อมต่อ DATABASE ไม่ได้ (timeout)","error");
cleanup();
}
}, 10000);

function cleanup(){
delete window[callbackName];
if(script.parentNode) script.parentNode.removeChild(script);
}

window[callbackName] = function(data){
if(done) return;
done = true;
clearTimeout(timeout);
showResult(data,boxNo);
cleanup();
};

script.onerror = function(){
if(done) return;
done = true;
clearTimeout(timeout);
toast("เชื่อมต่อ DATABASE ไม่ได้","error");
cleanup();
};

script.src = SCRIPT_URL
+ "?boxNo=" + encodeURIComponent(boxNo)
+ "&callback=" + callbackName;

document.body.appendChild(script);

}





// =====================
// Show Result
// =====================

function showResult(data,code){


const result=document.getElementById("scanResult");


document.getElementById("scanIdle").style.display="none";


stopCamera();


result.style.display="block";



if(data.found){


result.innerHTML=`

<div class="result-card">


<div class="result-top found">


<span class="badge found">
พบข้อมูล ✓
</span>


<span class="badge">
${data.type}
</span>


</div>



<div class="basket-hero">


<div class="label">
TRAY
</div>


<div class="num">
#${data.tray}
</div>


</div>




<div class="detail-list">


${row("BOX_NO",data.boxNo)}

${row("ITEM_CODE",data.itemCode)}

${row("ITEM_NAME",data.itemName)}

${row("QTY",data.qty)}

${row("NOTE",data.note)}


</div>



<div class="result-actions">


<button class="btn btn-secondary" id="again">

ค้นหาใหม่

</button>


<button class="btn btn-primary" id="scanAgain">

📷 สแกนต่อ

</button>


</div>



</div>

`;



}else{


result.innerHTML=`

<div class="result-card">


<div class="result-top notfound">


<span class="badge notfound">
ไม่พบข้อมูล
</span>


</div>



<div class="basket-hero">


<div class="label">
BOX_NO
</div>


<div class="num">
${code}
</div>


<p>
ไม่มีรหัสนี้ใน DATABASE
</p>


</div>


</div>

`;


}



document.getElementById("again")?.addEventListener("click",()=>{


result.style.display="none";

document.getElementById("scanIdle").style.display="block";

document.getElementById("manualInput").value="";

document.getElementById("manualInput").focus();


});



document.getElementById("scanAgain")?.addEventListener("click",openCamera);



}





function row(k,v){


return `

<div class="detail-row">

<span class="k">${k}</span>

<span class="v">
${v||"-"}
</span>


</div>

`;

}




// =====================
// Manual Input
// =====================


document
.getElementById("btnManualSearch")
.addEventListener("click",()=>{


searchBox(

document.getElementById("manualInput").value

);


});




document
.getElementById("manualInput")
.addEventListener("keydown",(e)=>{


if(e.key==="Enter"){

searchBox(e.target.value);

}


});




// =====================
// Camera (ผ่าน qr-scanner ทั้งหมด — ไม่มี loop สแกนเขียนเองแล้ว)
// =====================


async function openCamera(){


document.getElementById("scanIdle").style.display="none";

document.getElementById("scanCamera").style.display="block";



try{


const video = document.getElementById("video");

// qr-scanner จัดการ getUserMedia, เลือกกล้องหลัง, ตั้งความละเอียด,
// และ scan-region ที่เหมาะสมให้เองทั้งหมด ไม่ต้องตั้ง constraints เอง
qrScanner = new QrScanner(
video,
result => {
searchBox(result.data);
},
{
onDecodeError: () => {
// ไม่เจอ QR ในเฟรมนี้ เป็นเรื่องปกติมากระหว่างเล็งกล้อง ไม่ต้องแจ้งเตือน
},
preferredCamera: "environment",
highlightScanRegion: true,
highlightCodeOutline: true,
maxScansPerSecond: 25
}
);

await qrScanner.start();


// เช็คว่ากล้องรองรับไฟฉาย (torch) ไหม เพื่อช่วยส่องตอนสแกน QR ระยะใกล้
try{
const hasFlash = await qrScanner.hasFlash();
document.getElementById("btnTorch").style.display = hasFlash ? "flex" : "none";
}catch(torchErr){
console.log("Torch check failed:", torchErr);
document.getElementById("btnTorch").style.display = "none";
}


}catch(e){


console.log(e);

toast(
"เปิดกล้องไม่ได้: " + e.message,
"error"
);


document.getElementById("scanCamera").style.display="none";
document.getElementById("scanIdle").style.display="block";


}

}




function stopCamera(){

if(qrScanner){
qrScanner.stop();
qrScanner.destroy();
qrScanner = null;
}

document.getElementById("btnTorch").style.display="none";

}




function toggleTorch(){

if(!qrScanner) return;

qrScanner.toggleFlash().catch(err=>{
console.log("Torch toggle failed:", err);
});

}




// (ฟังก์ชันสแกนถูกแทนที่ด้วย qr-scanner ทั้งหมดแล้ว — ดูฟังก์ชัน openCamera ด้านบน)




document
.getElementById("btnOpenCam")
.addEventListener("click",openCamera);



document
.getElementById("btnCloseCam")
.addEventListener("click",()=>{


stopCamera();


document.getElementById("scanCamera").style.display="none";

document.getElementById("scanIdle").style.display="block";


});



document
.getElementById("btnTorch")
.addEventListener("click", toggleTorch);



// สถานะ DATABASE เขียวไว้เฉย ๆ เพราะเช็คได้ตอนค้นหาจริงเท่านั้น (ไม่มี healthcheck endpoint แยก)
document.getElementById("statusDot").classList.add("ok");


})();


</script>

<!-- ✅ PWA: register service worker (ไฟล์ sw.js อยู่โฟลเดอร์เดียวกัน) -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function (err) {
      console.log('SW register failed:', err);
    });
  });
}
</script>


</body>

</html>
